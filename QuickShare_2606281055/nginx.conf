server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Frontend ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy לשרת הפייתון ──────────────────────
    # אם תרצה ש-Nginx יעשה proxy לבקשות API
    # (אופציונלי – אפשר גם בלי זה)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;       # חשוב לסטרימינג!
        proxy_read_timeout 3600s;    # timeout ארוך לווידאו
    }
}
